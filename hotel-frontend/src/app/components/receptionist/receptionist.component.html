<div class="container py-5">
  <h1 class="text-center mb-5 text-gold">Receptionist Dashboard</h1>

  <div class="card">
    <div class="card-header bg-gold text-white">
      <h3>Manage Bookings</h3>
    </div>
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Room</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let booking of bookings">
            <td>{{ booking.booking_ID }}</td>
            <td>{{ booking.name }} {{ booking.surname }}</td>
            <td>{{ booking.room_name }}</td>
            <td>{{ booking.check_In_Date }}</td>
            <td>{{ booking.check_Out_Date }}</td>
            <td>
              <span class="badge" [ngClass]="{
                'bg-warning': booking.status === 'Pending',
                'bg-success': booking.status === 'Confirmed',
                'bg-danger': booking.status === 'Cancelled'
              }">{{ booking.status }}</span>
            </td>
            <td>
              <select class="form-select form-select-sm d-inline-block w-auto me-2" 
                      [value]="booking.status" 
                      (change)="updateBookingStatus(booking.booking_ID, $event)">
                <option value="Pending">Pending</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Cancelled">Cancelled</option>
              </select>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteBooking(booking.booking_ID)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
