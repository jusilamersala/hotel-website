<div class="container my-5 text-center">
  <h1 class="fw-bold mb-4">Spa & Wellness</h1>

  <div *ngFor="let service of spaServices">
    <div *ngIf="service.id === selectedService" class="card mx-auto shadow-sm p-4" style="max-width: 600px;">
      <i class="bi {{ service.icon }} fs-1 text-gold mb-3"></i>
      <h3 class="fw-bold">{{ service.title }}</h3>
      <p>{{ service.description }}</p>
    </div>
  </div>
</div>
